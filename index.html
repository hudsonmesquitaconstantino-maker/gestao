function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtBRL(n){n=Number(n)||0;return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function parseBRL(s){if(typeof s==='number')return s;s=String(s||'').replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.');var n=parseFloat(s);return isNaN(n)?0:n}

function mais3Meses(iso){var p=iso.split('-');var d=new Date(parseInt(p[0],10),parseInt(p[1],10)-1+3,parseInt(p[2],10));return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)}

 var d1=('0'+parseInt(a[2],10)).slice(-2),d2=('0'+parseInt(b[2],10)).slice(-2);

 return dataLonga(ini)+' a '+dataLonga(fim);

/* ---------- valor por extenso (reais) ---------- */
function extenso(n){
 n=Math.round((Number(n)||0)*100);var reais=Math.floor(n/100),cent=n%100;
 var U=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
 var D=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
 var C=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
 function tri(x){
  if(x===0)return'';if(x===100)return'cem';
  var c=Math.floor(x/100),r=x%100,s=[];
  if(c)s.push(C[c]);
  if(r<20){if(r)s.push(U[r])}else{var d=Math.floor(r/10),u=r%10;s.push(D[d]+(u?' e '+U[u]:''))}
  return s.join(' e ');
 }
 function num(x){
  if(x===0)return'zero';
  var mi=Math.floor(x/1000000),ml=Math.floor(x%1000000/1000),cc=x%1000,p=[];
  if(mi)p.push(mi===1?'um milhão':tri(mi)+' milhões');
  if(ml)p.push(ml===1?'mil':tri(ml)+' mil');
  if(cc)p.push(tri(cc));
  if(p.length>1){var last=p.pop();var conn=(cc===0||cc<100||cc%100===0)?' e ':', ';return p.join(', ')+conn+last}
  return p[0];
 }
 var t='';
 if(reais)t=num(reais)+(reais%1000000===0?' de':'')+(reais===1?' real':' reais');
 if(cent)t+=(reais?' e ':'')+num(cent)+(cent===1?' centavo':' centavos');
 if(!t)t='zero real';
 return t.charAt(0).toUpperCase()+t.slice(1);
}

    if(!S){S=normState(JSON.parse(JSON.stringify(SEED)));S.rev=Date.now();S.dev=DEV;REF.set(S);toast('🌱 Frota inicial carregada na nuvem');render()}
    return;
   }
   v=normState(v);
   if(!S){S=v;_ready=true;render();return}
   if(v.dev===DEV||v.rev<=S.rev)return;
   var adota=function(){S=v;if(TAB===0||TAB===3)render()};
   if(digitando()){var iv=setInterval(function(){if(!digitando()){clearInterval(iv);S=v;if(TAB===0||TAB===3)keepScreenStill(render)}},2000)}
   else keepScreenStill(adota);
  },function(err){toast('⚠️ Sem acesso ao banco: '+err.message)});
 });
}

function safeToReload(){
 try{

  if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'))return false;
  var ovs=document.querySelectorAll('.overlay.open');if(ovs&&ovs.length)return false;
 }catch(e){}

}

 try{
  fetch('index.html?upd='+Date.now(),{cache:'no-store'}).then(function(r){return r.text()}).then(function(t){
   var m=t.match(/APP_VER=(\d+)/);
   if(m&&parseInt(m[1],10)>APP_VER&&!_updFound){
    _updFound=true;toast('⬆️ Atualizando para a versão nova…');
    setTimeout(function tryReload(){if(safeToReload()){location.reload()}else{setTimeout(tryReload,20000)}},1500);
   }
  }).catch(function(){});
 }catch(e){}
}

 document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')checkUpdate()});
 window.addEventListener('pageshow',function(e){if(e&&e.persisted)checkUpdate()});
 window.addEventListener('focus',function(){checkUpdate()});
}catch(e){}
setInterval(checkUpdate,15*60*1000);

/* ---------- DOCUMENTOS (nó separado, carregado sob demanda) ---------- */
function verDoc(path,titulo){
 toast('📥 Baixando documento…');
 DOCSREF.child(path).once('value').then(function(s){
  var d=s.val();
  if(!d||!d.b64){toast('Documento não encontrado na nuvem — use a Importação inicial (⚙️)');return}
  abrirPdf(d.b64,titulo);
 }).catch(function(e){toast('⚠️ '+e.message)});
}
function abrirPdf(b64,titulo){
 var url=b64ToUrl(b64,'application/pdf');
 openSheet('<h3>'+esc(titulo)+'</h3><div id="pdfHost" class="sub">Preparando páginas…</div>'+
  '<a class="btn" style="text-align:center;text-decoration:none;color:#04121f" href="'+url+'" download="'+esc(titulo)+'.pdf">⬇️ Baixar</a>'+
  '<button class="btn sec" onclick="closeSheet(2)">Fechar</button>',2);
 garantirPdfjs().then(function(){
  var bin=atob(b64),arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return pdfjsLib.getDocument({data:arr}).promise;
 }).then(function(pdf){
  var host=document.getElementById('pdfHost');if(!host)return;
  host.innerHTML='';host.removeAttribute('class');
  var w=host.clientWidth||(document.getElementById('sheetBody2').clientWidth-28);
  var dpr=Math.min(window.devicePixelRatio||1,2);
  (function pg(n){
   if(n>pdf.numPages)return;
   pdf.getPage(n).then(function(page){
    var vp0=page.getViewport({scale:1});
    var vp=page.getViewport({scale:(w/vp0.width)*dpr});
    var cv=document.createElement('canvas');cv.className='pdfpg';cv.width=vp.width;cv.height=vp.height;
    host.appendChild(cv);
    page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise.then(function(){pg(n+1)});
   });
  })(1);
 }).catch(function(e){
  var host=document.getElementById('pdfHost');
  if(host)host.outerHTML='<iframe class="pdfv" src="'+url+'"></iframe>';
 });
}
function baixarDoc(path,nome){
 toast('📥 Preparando arquivo…');
 DOCSREF.child(path).once('value').then(function(s){
  var d=s.val();
  if(!d||!d.b64){toast('Arquivo não está na nuvem — use a Importação inicial (⚙️)');return}
  var a=document.createElement('a');a.href=b64ToUrl(d.b64,d.mime||'application/octet-stream');a.download=nome;
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},400);
 }).catch(function(e){toast('⚠️ '+e.message)});
}
function b64ToUrl(b64,mime){
 var bin=atob(b64),arr=new Uint8Array(bin.length);
 for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
 return URL.createObjectURL(new Blob([arr],{type:mime}));
}
var _pedirCb=null;
function pedirArquivo(path,accept,pk){
 var inp=document.createElement('input');inp.type='file';inp.accept=accept;
 inp.onchange=function(){
  if(!inp.files||!inp.files[0])return;
  enviarArquivo(inp.files[0],path,function(){
   if(pk){S.carros[pk].temCrlv=true;save();ficha(pk)}
   toast('✅ Documento salvo na nuvem');
  });
 };
 inp.click();
}
function enviarArquivo(file,path,cb){
 var r=new FileReader();
 r.onload=function(){
  var b64=String(r.result).split(',')[1];
  toast('☁️ Enviando '+file.name+'…');
  DOCSREF.child(path).set({b64:b64,name:file.name,mime:file.type||'application/pdf',size:file.size,em:Date.now()})
   .then(function(){if(cb)cb()})
   .catch(function(e){toast('⚠️ Falha no envio: '+e.message)});
 };
 r.readAsDataURL(file);
}
</script>

<script>
/* ===================== NOVA MANUTENÇÃO ===================== */
var MP=[],MB=[]; /* linhas de peças e blocos de mão de obra (rascunho) */
function vManut(){
 if(!MP.length)MP=[{valor:'',desc:'',loja:''}];
 if(!MB.length)MB=[{titulo:'Mecânico',nome:'Vinícius',servicos:''}];
 var h='<div class="card"><div class="tit">🔧 Nova manutenção</div>'+
 '<label>Carro</label><select id="mCarro" onchange="mPuxaCarro()"><option value="">— selecione —</option>'+opcoesCarros()+'</select>'+
 '<div id="mCarroInfo" class="sub"></div>'+
 '<label>Motorista</label><input id="mMotorista" placeholder="sugere o atual ao escolher o carro">'+
 '<div class="grid2"><div><label>Data (início)</label><input type="date" id="mIni" value="'+hoje()+'"></div>'+
 '<div><label>Data fim (se for período)</label><input type="date" id="mFim"></div></div>'+
 '<label>Odômetro (km)</label><input id="mOdo" inputmode="numeric" placeholder="101117">'+
 '<div class="sect">Peças</div><div id="mPecas"></div>'+
 '<button class="btn mini sec" onclick="MP.push({valor:\'\',desc:\'\',loja:\'\'});mDesenha()">➕ Peça</button>'+
 '<div class="sect">Mão de obra</div><div id="mBlocos"></div>'+
 '<button class="btn mini sec" onclick="MB.push({titulo:\'\',nome:\'\',servicos:\'\'});mDesenha()">➕ Bloco (Borracheiro, Retífica…)</button>'+
 '<div class="card" style="margin-top:12px;background:var(--card2)"><div class="kv">'+
 '<b>Peças</b><span id="mTotP">R$ 0,00</span><b>Mão de obra</b><span id="mTotM">R$ 0,00</span>'+
 '<b>TOTAL GERAL</b><span id="mTotG" style="color:var(--warn);font-weight:800">R$ 0,00</span></div></div>'+
 '<button class="btn ok" onclick="gerarManut()">✅ GERAR TEXTO + SALVAR NO HISTÓRICO</button>'+
 '<div id="mSaida"></div></div>';
 setTimeout(mDesenha,30);
 return h;
}
function opcoesCarros(sel){
 return carrosOrdenados().map(function(c){var pk=normPlaca(c.placa);
  return '<option value="'+pk+'"'+(pk===sel?' selected':'')+'>'+esc(c.nome)+' — '+esc(fmtPlaca(c.placa))+'</option>'}).join('');
}
function mPuxaCarro(){
 var pk=document.getElementById('mCarro').value,c=S.carros[pk];
 if(!c){document.getElementById('mCarroInfo').textContent='';return}
 document.getElementById('mCarroInfo').innerHTML='🚗 '+esc(c.nome)+' '+esc(c.motor)+' · '+esc(fmtPlaca(c.placa));
 if(c.motorista)document.getElementById('mMotorista').value=primNome(c.motorista);
 if(c.kmAtual)document.getElementById('mOdo').placeholder=String(c.kmAtual);
}
function mDesenha(){
 var hp='';
 MP.forEach(function(p,i){
  hp+='<div class="grid3">'+
   '<input placeholder="R$" inputmode="decimal" value="'+esc(p.valor)+'" oninput="MP['+i+'].valor=this.value;mTotais()">'+
   '<input placeholder="descrição da peça" value="'+esc(p.desc)+'" oninput="MP['+i+'].desc=this.value">'+
   '<input placeholder="loja" value="'+esc(p.loja)+'" oninput="MP['+i+'].loja=this.value">'+
   '<button class="xbt" onclick="MP.splice('+i+',1);mDesenha()">✕</button></div>';
 });
 document.getElementById('mPecas').innerHTML=hp||'<div class="sub">Sem peças.</div>';
 var hb='';
 MB.forEach(function(b,i){
  hb+='<div class="card" style="margin:6px 0;background:var(--card2)"><div class="grid2">'+
   '<div><label>Título</label><input placeholder="Mecânico / Borracheiro / Retífica" value="'+esc(b.titulo)+'" oninput="MB['+i+'].titulo=this.value"></div>'+
   '<div><label>Nome + valor</label><input placeholder="Vinícius — R$ 1.700,00" value="'+esc(b.nome)+'" oninput="MB['+i+'].nome=this.value;mTotais()"></div></div>'+
   '<label>Serviços (um por linha; anote "Próxima troca com X km" e "GARANTIA ATÉ data" quando houver)</label>'+
   '<textarea oninput="MB['+i+'].servicos=this.value">'+esc(b.servicos)+'</textarea>'+
   '<button class="btn mini red" onclick="MB.splice('+i+',1);mDesenha()">Remover bloco</button></div>';
 });
 document.getElementById('mBlocos').innerHTML=hb;
 mTotais();
}
function valorDoBloco(nome){var m=String(nome||'').match(/R\$\s*([\d\.\,]+)/);return m?parseBRL(m[1]):0}
function mTotais(){
 var tp=0;MP.forEach(function(p){tp+=parseBRL(p.valor)});
 var tm=0;MB.forEach(function(b){tm+=valorDoBloco(b.nome)});
 var el;
 if(el=document.getElementById('mTotP'))el.textContent='R$ '+fmtBRL(tp);
 if(el=document.getElementById('mTotM'))el.textContent='R$ '+fmtBRL(tm);
 if(el=document.getElementById('mTotG'))el.textContent='R$ '+fmtBRL(tp+tm);
}
function buildManutTexto(m,carro){
 var t='*VEÍCULO:* '+carro.nome+(carro.motor?' '+carro.motor:'')+'\n'+
 '*PLACA:* '+fmtPlaca(carro.placa)+'\n'+
 '*MOTORISTA:* '+m.motorista+'\n'+
 '*DATA:* '+periodoTexto(m.dataIni,m.dataFim)+'\n'+
 '*ODÔMETRO:* '+fmtKm(m.odometro)+' km\n'+
 '_______________________________________\n';
 if(m.pecas.length){
  t+='\n*[ PEÇAS: R$ '+fmtBRL(m.totalPecas)+' ]*\n';
  m.pecas.forEach(function(p){
   t+='• R$ '+fmtBRL(p.valor)+' - '+p.desc+(p.loja?' ('+p.loja+')':'')+'\n';
  });
 }
 if(m.blocos.length){
  t+='\n*[ MÃO DE OBRA: R$ '+fmtBRL(m.totalMO)+' ]*\n';
  m.blocos.forEach(function(b){
   t+='*'+(b.titulo||'Mecânico')+':* '+(b.nome||'')+'\n';
   b.servicos.forEach(function(s){t+='• '+s+'\n'});
  });
 }
 t+='\n*TOTAL GERAL: R$ '+fmtBRL(m.total)+'*';
 return t;
}
function gerarManut(){
 var pk=document.getElementById('mCarro').value;
 if(!pk){toast('Escolha o carro');return}
 var carro=S.carros[pk];
 var mot=document.getElementById('mMotorista').value.trim();
 if(!mot){toast('Informe o motorista');return}
 var ini=document.getElementById('mIni').value,fim=document.getElementById('mFim').value;
 if(!ini){toast('Informe a data');return}
 var odo=parseInt(document.getElementById('mOdo').value.replace(/\D/g,''),10)||0;
 var pecas=MP.filter(function(p){return p.desc.trim()||parseBRL(p.valor)>0}).map(function(p){return{valor:parseBRL(p.valor),desc:p.desc.trim(),loja:p.loja.trim()}});
 var blocos=MB.filter(function(b){return b.nome.trim()||b.servicos.trim()}).map(function(b){
  return{titulo:(b.titulo||'Mecânico').trim(),nome:b.nome.trim(),servicos:b.servicos.split('\n').map(function(s){return s.trim()}).filter(Boolean)};
 });
 var tp=0;pecas.forEach(function(p){tp+=p.valor});
 var tm=0;blocos.forEach(function(b){tm+=valorDoBloco(b.nome)});
 var m=normManut({id:idNovo('mn'),carro:pk,motorista:mot,dataIni:ini,dataFim:fim||'',odometro:odo,
  pecas:pecas,blocos:blocos,totalPecas:tp,totalMO:tm,total:tp+tm,criadoEm:Date.now()});
 m.texto=buildManutTexto(m,carro);
 S.manutencoes[m.id]=m;
 if(odo>carro.kmAtual)carro.kmAtual=odo;
 /* próximas trocas automáticas */
 blocos.forEach(function(b){b.servicos.forEach(function(s){
  if(/pr[óo]xima\s+troca/i.test(s))carro.proximasTrocas.push({texto:s});
 })});
 save();
 document.getElementById('mSaida').innerHTML='<div class="sect">Texto gerado (padrão WhatsApp)</div>'+
  '<div class="mono" id="mTexto">'+esc(m.texto)+'</div>'+
  '<button class="btn" onclick="copiarManut(\''+m.id+'\')">📋 COPIAR</button>';
 toast('✅ Gravado no histórico do '+carro.nome);
 MP=[];MB=[];
}
function copiarTexto(t){
 if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('📋 Copiado!')},function(){copiarFallback(t)})}
 else copiarFallback(t);
}
function copiarFallback(t){
 var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
 document.body.appendChild(ta);ta.focus();ta.select();
 try{document.execCommand('copy');toast('📋 Copiado!')}catch(e){toast('Segure no texto e copie manualmente')}
 document.body.removeChild(ta);
}
function copiarManut(id){copiarTexto(S.manutencoes[id].texto)}
function verManut(id){
 var m=S.manutencoes[id];if(!m)return;
 var c=S.carros[m.carro]||{nome:m.carro,placa:m.carro,motor:''};
 openSheet('<h3>'+esc(c.nome)+' — '+esc(periodoTexto(m.dataIni,m.dataFim))+'</h3>'+
  '<div class="mono">'+esc(m.texto)+'</div>'+
  '<button class="btn" onclick="copiarManut(\''+id+'\')">📋 Copiar</button>'+
  '<button class="btn red" onclick="excluirManut(\''+id+'\')">🗑 Excluir manutenção</button>'+
  '<button class="btn sec" onclick="closeSheet(2)">Fechar</button>',2);
}
function excluirManut(id){
 var m=S.manutencoes[id];
 ask('Excluir manutenção?','R$ '+fmtBRL(m.total)+' de '+periodoTexto(m.dataIni,m.dataFim)+' sai do histórico e do total do carro.','Excluir',function(){
  delete S.manutencoes[id];save();closeSheet(2);render();toast('🗑 Excluída');
 });
}

/* ===================== HISTÓRICO GERAL ===================== */
function vHistorico(){
 var todas=Object.keys(S.manutencoes).map(function(k){return S.manutencoes[k]})
  .sort(function(a,b){return (b.dataIni||'').localeCompare(a.dataIni)||b.criadoEm-a.criadoEm});
 var q=BUSCA_H.toLowerCase();
 if(q)todas=todas.filter(function(m){
  var c=S.carros[m.carro]||{};
  return (m.motorista+' '+m.carro+' '+(c.nome||'')+' '+(c.placa||'')+' '+m.texto).toLowerCase().indexOf(q)>=0;
 });
 var h='<div class="search"><input placeholder="🔎 Buscar por placa, motorista, peça…" value="'+esc(BUSCA_H)+'" oninput="BUSCA_H=this.value;render()"></div>';
 /* total por carro */
 var tot={};Object.keys(S.manutencoes).forEach(function(k){var m=S.manutencoes[k];tot[m.carro]=(tot[m.carro]||0)+m.total});
 var chips=Object.keys(tot).sort(function(a,b){return tot[b]-tot[a]});
 if(chips.length&&!q){
  h+='<div class="card"><div class="tit" style="font-size:13px;margin-bottom:4px">💰 Total gasto por carro</div>';
  chips.forEach(function(pk){var c=S.carros[pk];h+='<span class="chip warn">'+esc(c?c.nome:pk)+' · R$ '+fmtBRL(tot[pk])+'</span>'});
  h+='</div>';
 }
 if(!todas.length)h+='<div class="card"><div class="sub">Nenhuma manutenção'+(q?' encontrada para essa busca':' registrada ainda')+'.</div></div>';
 todas.forEach(function(m){
  var c=S.carros[m.carro]||{nome:m.carro,placa:m.carro};
  h+='<div class="card tap" onclick="verManut(\''+m.id+'\')"><div class="row">'+plateHtml(c.placa)+
   '<div class="grow"><div class="tit" style="font-size:14px">'+esc(c.nome)+'</div>'+
   '<div class="sub">'+esc(periodoTexto(m.dataIni,m.dataFim))+' · '+esc(primNome(m.motorista))+'</div></div>'+
   '<div style="color:var(--warn);font-weight:800">R$ '+fmtBRL(m.total)+'</div></div></div>';
 });
 return h;
}
</script>

<script>

function ncPuxaCarro(){
 var pk=document.getElementById('ncCarro').value,c=S.carros[pk];
 var info=document.getElementById('ncCarroInfo');
 if(!c){info.textContent='';return}
 info.innerHTML='🚗 '+esc(c.nome)+' '+esc(c.motor)+' · '+esc(c.ano)+' · '+esc(fmtPlaca(c.placa))+' · '+fmtKm(c.kmAtual)+' km · ref. '+(c.valorRef?'R$ '+fmtBRL(c.valorRef):'—');
 document.getElementById('ncLocador').value=c.locadorId;
 if(c.semanalPadrao)document.getElementById('ncSemanal').value=fmtBRL(c.semanalPadrao);
 if(c.caucaoPadrao){document.getElementById('ncCaucao').value=fmtBRL(c.caucaoPadrao);ncMultaAuto()}
 document.getElementById('ncKm').value=c.kmAtual||'';
 document.getElementById('ncComb').value=c.combustivel||'';
 ncCl34Auto();
}
function ncMultaAuto(){var v=document.getElementById('ncCaucao').value;document.getElementById('ncMultaResc').value=v}
function ncCl34Auto(force){
 var el=document.getElementById('ncCl34'),sel=document.getElementById('ncTem34');
 if(!el)return;
 if(sel&&sel.value==='nao'){el.style.display='none';return}
 el.style.display='';
 if(el.dataset.manual==='1'&&!force)return;
 var s=parseBRL(document.getElementById('ncSemanal').value);
 el.value='Do Pagamento Antecipado: No ato da assinatura, o LOCATÁRIO pagará a semana final do contrato de forma antecipada ('+(s?'R$ '+fmtBRL(s):'R$ 0,00')+').';
}
document.addEventListener('input',function(e){if(e.target&&e.target.id==='ncCl34')e.target.dataset.manual='1'});

function dadosContratoDoForm(){
 function g(id){return document.getElementById(id).value.trim()}
 var pk=g('ncCarro');if(!pk){toast('Escolha o carro');return null}
 if(!g('ncNome')){toast('Nome do locatário é obrigatório');return null}
 if(!g('ncIni')||!g('ncFim')){toast('Preencha as datas');return null}
 var cnh=g('ncCnh'),cnhVal=g('ncCnhVal');
 return normContrato({
  id:idNovo('ct'),carro:pk,origem:'gerado',status:'vigente',
  locadorId:g('ncLocador'),locadorNome:LOCADORES[g('ncLocador')].nome,
  locatario:{nome:g('ncNome').toUpperCase(),cpf:g('ncCpf'),
   rg:g('ncRg')+(cnh?' | CNH '+cnh+(cnhVal?' (val. '+dataBR(cnhVal)+')':''):''),
   cnh:cnh,cnhVal:cnhVal,endereco:g('ncEnd'),cep:g('ncCep'),tel:g('ncTel')},
  semanal:parseBRL(g('ncSemanal')),caucao:parseBRL(g('ncCaucao')),
  multaDiaria:parseBRL(g('ncMultaDia'))||115,multaRescisao:parseBRL(g('ncMultaResc'))||parseBRL(g('ncCaucao')),
  inicio:g('ncIni'),fim:g('ncFim'),kmInicial:parseInt(g('ncKm').replace(/\D/g,''),10)||0,
  pix:g('ncPixBanco')+' / '+g('ncPixFav')+' / '+g('ncPixChave'),
  cl34:(document.getElementById('ncTem34').value==='nao')?'':g('ncCl34'),acessorios:g('ncAcess'),combustiveis:g('ncComb'),temDocx:false,temPdf:false
 });
}
function gerarContrato(){
 var ct=dadosContratoDoForm();if(!ct)return;
 var c=S.carros[ct.carro];
 toast('📝 Gerando Word…');
 montarDocx(ct,c).then(function(blob){
  /* registrar no estado */
  if(c.contratoVigenteId&&S.contratos[c.contratoVigenteId]){
   S.contratos[c.contratoVigenteId].status='encerrado';
   S.contratos[c.contratoVigenteId].encerradoEm=hoje();
  }
  S.contratos[ct.id]=ct;
  c.contratoVigenteId=ct.id;c.motorista=ct.locatario.nome;c.status='ativo';
  if(ct.kmInicial)c.kmAtual=ct.kmInicial;
  c.semanalPadrao=ct.semanal;c.caucaoPadrao=ct.caucao;
  save();
  /* baixar + subir para a nuvem */
  var nome='Contrato '+c.nome+' '+fmtPlaca(c.placa)+' '+dataBR(ct.inicio).replace(/\//g,'_')+'.docx';
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nome;
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},400);
  blobB64(blob).then(function(b64){
   return DOCSREF.child(ct.carro+'/ct/'+ct.id+'/docx').set({b64:b64,name:nome,mime:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',size:blob.size,em:Date.now()});
  }).then(function(){
   S.contratos[ct.id].temDocx=true;save();
   toast('✅ Word baixado e salvo · gerando PDF…');render();
   return montarPdf(ct,c);
  }).then(function(pb){
   return blobB64(pb).then(function(pb64){
    return DOCSREF.child(ct.carro+'/ct/'+ct.id+'/pdf').set({b64:pb64,name:nome.replace('.docx','.pdf'),mime:'application/pdf',size:pb.size,em:Date.now()});
   });
  }).then(function(){
   S.contratos[ct.id].temPdf=true;save();render();
   toast('📄 PDF do contrato salvo na nuvem — já dá para Ler na ficha');
  }).catch(function(e){toast('⚠️ Word ok, mas o PDF falhou: '+e.message)});
 }).catch(function(e){toast('⚠️ Erro ao gerar: '+e.message)});
}

 ask('Trocar motorista do '+c.nome+'?','O contrato de '+primNome(c.motorista)+' será encerrado e vai para os contratos anteriores (nada se perde). Em seguida você cria o novo.','Encerrar e continuar',function(){

  setTimeout(function(){var s=document.getElementById('ncCarro');if(s){s.value=pk;ncPuxaCarro()}},80);
  toast('🔁 Contrato encerrado — preencha o novo motorista');
 });
}

 toast('📝 Regerando Word…');
 montarDocx(ct,c).then(function(blob){

  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=nome;
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},400);
 }).catch(function(e){toast('⚠️ '+e.message)});
}

function vehLinhas(ct,carro){

function montarPdf(ct,carro){
 return garantirJspdf().then(function(){
  var J=window.jspdf.jsPDF,doc=new J({unit:'pt',format:'a4'});
  var W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),M=48,y=M,lh=13;

  function need(h){if(y+h>H-M-20){doc.addPage();y=M}}
  function para(t,o){
   o=o||{};t=String(t).replace(/▪/g,'•');
   doc.setFont('helvetica',o.b?'bold':'normal');doc.setFontSize(o.sz||9.5);doc.setTextColor(20);
   var lines=doc.splitTextToSize(t,W-2*M-8);
   lines.forEach(function(L){need(lh);doc.text(L,o.center?W/2:M+4,y,o.center?{align:'center'}:undefined);y+=lh});
   y+=o.gap==null?3:o.gap;
  }
  function titulo(t){
   need(26);doc.setFillColor(217,217,217);doc.rect(M,y-4,W-2*M,17,'F');

   });

  });
  para('E, por estarem assim justos e contratados, assinam o presente em 02 (duas) vias de igual teor e forma.',{gap:8});
  para('São Gonçalo, '+dataLonga(ct.inicio)+'.',{gap:34});

  var n=doc.getNumberOfPages();

  return doc.output('blob');
 });

function montarDocx(ct,carro){
 var D=window.docx;
 var loc=LOCADORES[ct.locadorId]||{nome:ct.locadorNome,cpf:'',rg:''};
 var lt=ct.locatario;
 var W=D.WidthType.DXA,TOTAL=9640;
 function run(t,opt){opt=opt||{};return new D.TextRun({text:t,bold:!!opt.b,size:opt.sz||21,font:'Calibri'})}
 function par(t,opt){opt=opt||{};return new D.Paragraph({children:[run(t,opt)],alignment:opt.center?D.AlignmentType.CENTER:D.AlignmentType.LEFT,spacing:{after:opt.after==null?80:opt.after,before:opt.before||0}})}
 function parRuns(runs,opt){opt=opt||{};return new D.Paragraph({children:runs,spacing:{after:opt.after==null?80:opt.after}})}
 function cell(paras,w,shade){
  return new D.TableCell({children:paras,width:{size:w,type:W},shading:shade?{type:D.ShadingType.CLEAR,fill:'D9D9D9'}:undefined,margins:{top:80,bottom:80,left:120,right:120}});
 }
 function headerBar(txt){
  return new D.Table({columnWidths:[TOTAL],width:{size:TOTAL,type:W},rows:[new D.TableRow({children:[cell([par(txt,{b:true,center:true,after:0})],TOTAL,true)]})]});
 }
 function box(paras){
  return new D.Table({columnWidths:[TOTAL],width:{size:TOTAL,type:W},rows:[new D.TableRow({children:[cell(paras,TOTAL)]})]});
 }
 function esp(){return par('',{after:60})}
 /* identificação */
 var meio=TOTAL/2;
 var idTable=new D.Table({columnWidths:[meio,meio],width:{size:TOTAL,type:W},rows:[new D.TableRow({children:[
  cell([par('LOCADOR',{b:true}),par('Nome: '+loc.nome),par('CPF: '+loc.cpf),par('RG / Doc: '+loc.rg),par('Endereço: '+LOCADOR_END),par('CEP: '+LOCADOR_CEP)],meio),
  cell([par('LOCATÁRIO',{b:true}),par('Nome: '+lt.nome),par('CPF: '+lt.cpf),par('RG / Doc: '+lt.rg),par('Endereço: '+lt.endereco),par('CEP: '+lt.cep),par('Telefone: '+lt.tel)],meio)
 ]})]});
 /* tabela do veículo */
 var vw1=3200,vw2=TOTAL-3200-240;
 function vrow(a,b){return new D.TableRow({children:[cell([par(a,{after:0})],vw1),cell([par(b,{b:true,after:0})],vw2)]})}
 var vehTable=new D.Table({columnWidths:[vw1,vw2],width:{size:vw1+vw2,type:W},rows:[
  vrow('Modelo',carro.nome+' '+carro.motor),
  vrow('Ano Fabricação/Modelo',carro.ano),
  vrow('Placa',fmtPlaca(carro.placa)),
  vrow('Chassi',carro.chassi),
  vrow('Quilometragem Inicial',fmtKm(ct.kmInicial)+' KM'),
  vrow('Acessórios',ct.acessorios),
  vrow('Combustíveis',ct.combustiveis||carro.combustivel)
 ]});
 var secoes=[];
 clausulasContrato(ct,carro).forEach(function(cl){
  secoes.push(headerBar(cl.h));
  var paras=[];
  cl.itens.forEach(function(it){
   if(it.veh)paras.push(vehTable);
   else paras.push(par(it.p));
  });
  secoes.push(box(paras));secoes.push(esp());
 });
 var docChildren=[
  par('CONTRATO PARTICULAR DE LOCAÇÃO DE VEÍCULO AUTOMOTOR',{b:true,center:true,sz:26,after:160}),
  headerBar('IDENTIFICAÇÃO DAS PARTES CONTRATANTES'),idTable,esp()
 ].concat(secoes).concat([
  par('E, por estarem assim justos e contratados, assinam o presente em 02 (duas) vias de igual teor e forma.',{after:160}),
  par('São Gonçalo, '+dataLonga(ct.inicio)+'.',{after:400}),
  new D.Table({columnWidths:[meio,meio],width:{size:TOTAL,type:W},rows:[
   new D.TableRow({children:[cell([par('LOCADOR',{b:true,center:true})],meio),cell([par('LOCATÁRIO',{b:true,center:true})],meio)]}),
   new D.TableRow({children:[
    cell([par('',{after:300}),par('________________________________',{center:true,after:0}),par(loc.nome,{center:true,after:0}),par('CPF: '+loc.cpf,{center:true,after:0})],meio),
    cell([par('',{after:300}),par('________________________________',{center:true,after:0}),par(lt.nome,{center:true,after:0}),par('CPF: '+lt.cpf,{center:true,after:0})],meio)
   ]})
  ]})
 ]);
 var doc=new D.Document({
  sections:[{
   properties:{page:{margin:{top:900,bottom:900,left:1000,right:1000}}},
   footers:{default:new D.Footer({children:[new D.Paragraph({children:[new D.TextRun({text:'GuimasCar | Locação de Veículos',size:18,color:'666666',font:'Calibri'})],alignment:D.AlignmentType.CENTER})]})},
   children:docChildren
  }]
 });
 return D.Packer.toBlob(doc);
}

function importar(){
 var inp=document.getElementById('impIn');
 if(!inp.files||!inp.files.length){toast('Selecione os arquivos');return}
 var files=Array.prototype.slice.call(inp.files),i=0,ok=0,falha=[];
 var stat=document.getElementById('impStat');
 function prox(){
  if(i>=files.length){
   save();render();
   stat.innerHTML+='<br><b>✅ Concluído: '+ok+' enviados'+(falha.length?' · ⚠️ ignorados: '+falha.join(', '):'')+'</b>';
   toast('☁️ Importação concluída');return;
  }
  var f=files[i++],m,path=null,marca=null;
  var nome=f.name.replace(/\.pdf$|\.docx$/i,'');
  if(m=nome.match(/^CRLV-([A-Z0-9]{7})$/i)){var pk=m[1].toUpperCase();if(S.carros[pk]){path=pk+'/crlv';marca=function(){S.carros[pk].temCrlv=true}}}
  else if(m=nome.match(/^CONTRATOPDF-([A-Z0-9]{7})$/i)){var pk2=m[1].toUpperCase(),c2=S.carros[pk2];if(c2&&c2.contratoVigenteId){path=pk2+'/ct/'+c2.contratoVigenteId+'/pdf';marca=function(){S.contratos[c2.contratoVigenteId].temPdf=true}}}
  else if(m=nome.match(/^CONTRATO-([A-Z0-9]{7})$/i)){var pk3=m[1].toUpperCase(),c3=S.carros[pk3];if(c3&&c3.contratoVigenteId){path=pk3+'/ct/'+c3.contratoVigenteId+'/docx';marca=function(){S.contratos[c3.contratoVigenteId].temDocx=true}}}
  if(!path){falha.push(f.name);stat.innerHTML+='⚠️ '+esc(f.name)+' não reconhecido<br>';prox();return}
  var r=new FileReader();
  r.onload=function(){
   var b64=String(r.result).split(',')[1];
   DOCSREF.child(path).set({b64:b64,name:f.name,mime:f.type||'application/pdf',size:f.size,em:Date.now()}).then(function(){
    ok++;if(marca)marca();stat.innerHTML='☁️ '+ok+'/'+files.length+' — '+esc(f.name)+'<br>'+stat.innerHTML;prox();
   }).catch(function(e){falha.push(f.name);stat.innerHTML+='⚠️ '+esc(f.name)+': '+esc(e.message)+'<br>';prox()});
  };
  r.readAsDataURL(f);
 }
 stat.innerHTML='Enviando '+files.length+' arquivos…<br>';
 prox();
}
