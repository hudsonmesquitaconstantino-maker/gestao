/* ---------- valor por extenso (reais) ---------- */
function extenso(n){
 n=Math.round((Number(n)||0)*100);var reais=Math.floor(n/100),cent=n%100;
 var U=['','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];

var DB=null,REF=null,DOCSREF=null,FAMHASH='',_pushT=null,_ready=false;
function famHash(key){
 return crypto.subtle.digest('SHA-256',new TextEncoder().encode('guimas:'+key))
  .then(function(buf){return Array.prototype.map.call(new Uint8Array(buf),function(b){return('0'+b.toString(16)).slice(-2)}).join('')});
}
function digitando(){var a=document.activeElement;return !!(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'||a.tagName==='SELECT'))}
function save(){
 if(!S)return;
 S.rev=Date.now();S.dev=DEV;
 try{localStorage.setItem('gestao_cache',JSON.stringify(S))}catch(e){}
 clearTimeout(_pushT);
 _pushT=setTimeout(function(){
  if(REF)REF.set(S).catch(function(e){toast('⚠️ Falha ao sincronizar: '+e.message)});
 },1200);
}
function conectar(chave){
 famHash(chave).then(function(h){
  FAMHASH=h;
  REF=DB.ref('familias/'+h+'/gestao');
  DOCSREF=DB.ref('familias/'+h+'/gestaoDocs');
  REF.on('value',function(snap){
   var v=snap.val();
   document.getElementById('syncDot').classList.add('on');
   if(!v){ /* primeira vez: semear */
    if(!S){S=normState(JSON.parse(JSON.stringify(SEED)));S.rev=Date.now();S.dev=DEV;REF.set(S);toast('🌱 Frota inicial carregada na nuvem');render();setTimeout(function(){atualizarFipe()},2500)}
    return;
   }
   v=normState(v);
   if(!S){S=v;_ready=true;render();setTimeout(function(){atualizarFipe()},2500);return}
   if(v.dev===DEV||v.rev<=S.rev)return;
   var adota=function(){S=v;if(TAB===0||TAB===3||TAB===4)render();
    try{if(window._fichaPk&&document.getElementById('ovSheet').classList.contains('open')&&!document.getElementById('ovSheet2').classList.contains('open'))ficha(window._fichaPk)}catch(e){}};
   if(digitando()){var iv=setInterval(function(){if(!digitando()){clearInterval(iv);S=v;if(TAB===0||TAB===3||TAB===4)keepScreenStill(render)}},2000)}
   else keepScreenStill(adota);
  },function(err){toast('⚠️ Sem acesso ao banco: '+err.message)});
 });
}

function safeToReload(){
 try{
  var a=document.activeElement;
  if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'))return false;
  var ovs=document.querySelectorAll('.overlay.open');if(ovs&&ovs.length)return false;
 }catch(e){}
 return true;
}
var _updFound=false;
function checkUpdate(manual){
 try{
  fetch('index.html?upd='+Date.now(),{cache:'no-store'}).then(function(r){return r.text()}).then(function(t){
   var m=t.match(/APP_VER=(\d+)/);
   var nv=m?parseInt(m[1],10):0;
   if(nv>APP_VER&&!_updFound){
    _updFound=true;toast('⬆️ Atualizando para a v'+nv+'…');
    var aplicar=function(){
     /* 1) grava a versão nova no cache que o atalho usa (próximas aberturas já nascem novas) */
     try{
      if(window.caches&&caches.open){
       var base=location.pathname.replace(/index\.html$/,'');
       var mk=function(){return new Response(t,{headers:{'Content-Type':'text/html; charset=utf-8'}})};
       caches.open('gestao-guimas-v1').then(function(c){
        c.put(new Request(base),mk()).catch(function(){});
        c.put(new Request(base+'index.html'),mk()).catch(function(){});
       }).catch(function(){});
      }
     }catch(e){}
     /* 2) troca o app em memória AGORA, sem navegar (funciona no atalho da tela de início) */
     setTimeout(function(){
      try{document.open();document.write(t);document.close()}
      catch(e){try{location.replace(location.pathname+'?v='+nv)}catch(e2){location.reload()}}
     },350);
    };
    setTimeout(function tryReload(){
     if(safeToReload()){aplicar()}else{setTimeout(tryReload,20000)}
    },1200);
   }else if(manual&&!_updFound){
    toast(nv&&nv<=APP_VER?'✅ v'+APP_VER+' já é a versão mais recente publicada':'⚠️ Não consegui ler a versão publicada');
   }
  }).catch(function(){if(manual)toast('⚠️ Sem internet para verificar agora')});
 }catch(e){}
}
setTimeout(checkUpdate,4000);
try{
 document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')checkUpdate()});
 window.addEventListener('pageshow',function(e){if(e&&e.persisted)checkUpdate()});
 window.addEventListener('focus',function(){checkUpdate()});
}catch(e){}
setInterval(checkUpdate,15*60*1000);

/* ---------- DOCUMENTOS (nó separado, carregado sob demanda) ---------- */
function idb(){return new Promise(function(res,rej){var r=indexedDB.open('gestao_docs',1);r.onupgradeneeded=function(){r.result.createObjectStore('d')};r.onsuccess=function(){res(r.result)};r.onerror=function(){rej(r.error)}})}
function idbGet(k){return idb().then(function(db){return new Promise(function(res){var t=db.transaction('d').objectStore('d').get(k);t.onsuccess=function(){res(t.result||null)};t.onerror=function(){res(null)}})}).catch(function(){return null})}
function idbSet(k,v){return idb().then(function(db){return new Promise(function(res){var t=db.transaction('d','readwrite');t.objectStore('d').put(v,k);t.oncomplete=function(){res(true)};t.onerror=function(){res(false)}})}).catch(function(){return false})}
function idbDel(k){return idb().then(function(db){return new Promise(function(res){var t=db.transaction('d','readwrite');t.objectStore('d').delete(k);t.oncomplete=function(){res(true)};t.onerror=function(){res(false)}})}).catch(function(){return false})}
function pegarDoc(path,pk,tipo){ /* aparelho → nuvem → autocorreção do caminho */
 return idbGet(path).then(function(d){
  if(d&&d.b64)return d;
  return DOCSREF.child(path).once('value').then(function(s){
   var v=s.val();
   if(v&&v.b64){idbSet(path,v);return v}
   if(!pk||!tipo)return v;
   /* autocorreção: procura o arquivo deste carro na nuvem (contrato pode estar sob outro id) */
   return DOCSREF.child(pk+'/ct').once('value').then(function(s2){
    var todos=s2.val()||{},achado=null,achId=null;
    Object.keys(todos).forEach(function(cid){
     var n=todos[cid]||{};
     if(!achado&&n[tipo]&&n[tipo].b64){achado=n[tipo];achId=cid}
    });
    if(achado){
     idbSet(path,achado);
     DOCSREF.child(path).set(achado).catch(function(){}); /* conserta o endereço p/ próxima vez */
    }
    return achado;
   });
  });
 });
}

  abrirPdf(d.b64,titulo);
 }).catch(function(e){toast('⚠️ '+e.message)});
}

 }).catch(function(e){toast('⚠️ '+e.message)});

function abrirPdf(b64,titulo){
 var url=b64ToUrl(b64,'application/pdf');
 openSheet('<h3>'+esc(titulo)+'</h3><div id="pdfHost" class="sub">Preparando páginas…</div>'+
  '<a class="btn" style="text-align:center;text-decoration:none;color:#04121f" href="'+url+'" download="'+esc(titulo)+'.pdf">⬇️ Baixar</a>'+
  '<button class="btn sec" onclick="closeSheet(2)">Fechar</button>',2);
 garantirPdfjs().then(function(){
  var bin=atob(b64),arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return pdfjsLib.getDocument({data:arr}).promise;
 }).then(function(pdf){
  var host=document.getElementById('pdfHost');if(!host)return;
  host.innerHTML='';host.removeAttribute('class');
  var w=host.clientWidth||(document.getElementById('sheetBody2').clientWidth-28);
  var dpr=Math.min(window.devicePixelRatio||1,2);
  (function pg(n){
   if(n>pdf.numPages)return;
   pdf.getPage(n).then(function(page){
    var vp0=page.getViewport({scale:1});
    var vp=page.getViewport({scale:(w/vp0.width)*dpr});
    var cv=document.createElement('canvas');cv.className='pdfpg';cv.width=vp.width;cv.height=vp.height;
    host.appendChild(cv);
    page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise.then(function(){pg(n+1)});
   });
  })(1);
 }).catch(function(e){
  var host=document.getElementById('pdfHost');
  if(host)host.outerHTML='<iframe class="pdfv" src="'+url+'"></iframe>';
 });
}
function baixarDoc(path,nome,pk,tipo){
 toast('📥 Preparando arquivo…');
 pegarDoc(path,pk,tipo).then(function(d){
  if(!d||!d.b64){toast('Arquivo não encontrado — rode a Importação inicial ou o download offline (⚙️)');return}
  var a=document.createElement('a');a.href=b64ToUrl(d.b64,d.mime||'application/octet-stream');a.download=nome;
  document.body.appendChild(a);a.click();setTimeout(function(){document.body.removeChild(a)},400);
 }).catch(function(e){toast('⚠️ '+e.message)});
}
function blobB64(blob){return blob.arrayBuffer().then(function(ab){var u=new Uint8Array(ab),s='';for(var i=0;i<u.length;i+=32768)s+=String.fromCharCode.apply(null,u.subarray(i,i+32768));return btoa(s)})}
function b64ToUrl(b64,mime){
 var bin=atob(b64),arr=new Uint8Array(bin.length);
 for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
 return URL.createObjectURL(new Blob([arr],{type:mime}));
}

 var inp=document.createElement('input');inp.type='file';inp.accept=accept;
 inp.onchange=function(){
  if(!inp.files||!inp.files[0])return;
  enviarArquivo(inp.files[0],path,function(){
   if(pk){S.carros[pk].temCrlv=true;save();ficha(pk)}
   toast('✅ Documento salvo na nuvem');
  });
 };
 inp.click();
}
function enviarArquivo(file,path,cb){
 var r=new FileReader();
 r.onload=function(){
  var b64=String(r.result).split(',')[1];
  toast('☁️ Enviando '+file.name+'…');
  var doc={b64:b64,name:file.name,mime:file.type||'application/pdf',size:file.size,em:Date.now()};
  idbSet(path,doc);
  DOCSREF.child(path).set(doc)
   .then(function(){if(cb)cb()})
   .catch(function(e){toast('⚠️ Falha no envio: '+e.message)});
 };
 r.readAsDataURL(file);
}

var FIPE='https://parallelum.com.br/fipe/api/v1/carros';
function fipeFluxo(pk){
 _fipeCarro=pk;
 var c=S.carros[pk];
 openSheet('<h3>💰 Tabela FIPE</h3><p class="sub">'+esc(c.nome)+' — escolha a versão exata uma única vez. Depois o valor de referência atualiza sozinho todo dia.</p>'+
 '<label>Marca</label><select id="fpM" onchange="fipeModelos()"><option value="">carregando marcas…</option></select>'+
 '<label>Modelo (versão)</label><select id="fpMo" onchange="fipeAnos()" disabled><option value="">—</option></select>'+
 '<label>Ano / combustível</label><select id="fpA" disabled><option value="">—</option></select>'+
 '<button class="btn ok" onclick="fipeVincular(\''+pk+'\')">✅ Vincular e buscar valor</button>'+
 (c.fipeM?'<button class="btn red" onclick="fipeDesvincular(\''+pk+'\')">Desvincular</button>':'')+
 '<button class="btn sec" onclick="closeSheet(2)">Voltar</button>',2);
 fetch(FIPE+'/marcas').then(function(r){return r.json()}).then(function(ms){
  var sel=document.getElementById('fpM');if(!sel)return;
  sel.innerHTML='<option value="">— escolha —</option>'+ms.map(function(m){return '<option value="'+m.codigo+'">'+esc(m.nome)+'</option>'}).join('');
  var alvo=(c.modeloCRLV.split('/')[0]||'').toLowerCase().slice(0,4);
  if(c.fipeM){sel.value=c.fipeM;fipeModelos()}
  else if(alvo){for(var i=0;i<ms.length;i++){if(ms[i].nome.toLowerCase().indexOf(alvo)===0||alvo.indexOf(ms[i].nome.toLowerCase().slice(0,4))===0){sel.value=ms[i].codigo;fipeModelos();break}}}
 }).catch(function(){toast('⚠️ FIPE fora do ar agora — tente depois')});
}
function fipeModelos(){
 var m=document.getElementById('fpM').value,sel=document.getElementById('fpMo');
 if(!m){sel.disabled=true;return}
 sel.disabled=true;sel.innerHTML='<option value="">carregando…</option>';
 fetch(FIPE+'/marcas/'+m+'/modelos').then(function(r){return r.json()}).then(function(d){
  var lista=d.modelos.slice();
  var atual=_fipeCarro?S.carros[_fipeCarro]:null;
  var termo=atual?atual.nome.split(' ')[0].toLowerCase():'';
  lista.sort(function(a,b){
   var pa=termo&&a.nome.toLowerCase().indexOf(termo)>=0?0:1;
   var pb=termo&&b.nome.toLowerCase().indexOf(termo)>=0?0:1;
   return pa-pb||a.nome.localeCompare(b.nome);
  });
  sel.innerHTML='<option value="">— escolha —</option>'+lista.map(function(x){return '<option value="'+x.codigo+'">'+esc(x.nome)+'</option>'}).join('');
  sel.disabled=false;
  if(atual&&atual.fipeMo){sel.value=atual.fipeMo;fipeAnos()}
 }).catch(function(){sel.innerHTML='<option value="">erro — reabra</option>'});
}
function fipeAnos(){
 var m=document.getElementById('fpM').value,mo=document.getElementById('fpMo').value,sel=document.getElementById('fpA');
 if(!mo){sel.disabled=true;return}
 sel.disabled=true;sel.innerHTML='<option value="">carregando…</option>';
 fetch(FIPE+'/marcas/'+m+'/modelos/'+mo+'/anos').then(function(r){return r.json()}).then(function(anos){
  sel.innerHTML='<option value="">— escolha —</option>'+anos.map(function(a){return '<option value="'+a.codigo+'">'+esc(a.nome)+'</option>'}).join('');
  sel.disabled=false;
  var atual=_fipeCarro?S.carros[_fipeCarro]:null;
  if(atual){
   if(atual.fipeA)sel.value=atual.fipeA;
   else{var anoMod=(atual.ano.split('/')[1]||'').trim();for(var i=0;i<anos.length;i++){if(anos[i].nome.indexOf(anoMod)===0){sel.value=anos[i].codigo;break}}}
  }
 }).catch(function(){sel.innerHTML='<option value="">erro — reabra</option>'});
}
var _fipeCarro=null;
function fipeVincular(pk){
 var m=document.getElementById('fpM').value,mo=document.getElementById('fpMo').value,a=document.getElementById('fpA').value;
 if(!m||!mo||!a){toast('Escolha marca, modelo e ano');return}
 toast('💰 Buscando valor na FIPE…');
 fetch(FIPE+'/marcas/'+m+'/modelos/'+mo+'/anos/'+a).then(function(r){return r.json()}).then(function(d){
  var v=parseBRL(d.Valor||'');
  if(!v){toast('⚠️ FIPE não retornou valor');return}
  var c=S.carros[pk];
  c.fipeM=m;c.fipeMo=mo;c.fipeA=a;c.valorRef=v;c.fipeMes=(d.MesReferencia||'').trim();
  save();closeSheet(2);ficha(pk);
  toast('✅ '+d.Modelo+' — R$ '+fmtBRL(v));
 }).catch(function(){toast('⚠️ FIPE fora do ar agora')});
}
function fipeDesvincular(pk){
 var c=S.carros[pk];c.fipeM='';c.fipeMo='';c.fipeA='';c.fipeMes='';
 save();closeSheet(2);ficha(pk);toast('FIPE desvinculada — valor volta a ser manual');
}
function atualizarFipe(force){
 if(!S)return;
 var d=hoje();
 if(!force&&localStorage.getItem('gestao_fipe_dia')===d)return;
 var pend=Object.keys(S.carros).filter(function(k){var c=S.carros[k];return c.fipeM&&c.fipeMo&&c.fipeA});
 if(!pend.length){localStorage.setItem('gestao_fipe_dia',d);return}
 var mudou=false,i=0;
 (function next(){
  if(i>=pend.length){
   localStorage.setItem('gestao_fipe_dia',d);
   if(mudou){save();if(TAB===0||TAB===3)render();toast('💰 Valores FIPE do dia aplicados')}
   return;
  }
  var c=S.carros[pend[i++]];
  fetch(FIPE+'/marcas/'+c.fipeM+'/modelos/'+c.fipeMo+'/anos/'+c.fipeA)
   .then(function(r){return r.json()}).then(function(dd){
    var v=parseBRL(dd.Valor||'');
    if(v){if(Math.round(v)!==Math.round(c.valorRef)){mudou=true}c.valorRef=v;c.fipeMes=(dd.MesReferencia||'').trim()}
    next();
   }).catch(function(){next()});
 })();
}

 var id=idNovo('ob');
 S.observacoes[id]={id:id,carro:pk||'',texto:tx,data:hoje(),criadoEm:Date.now(),feito:false,feitoEm:''};
 save();closeSheet(2);render();
 if(pk&&window._fichaPk)ficha(pk);
 toast('📝 Observação salva'+(pk?'' :' nas gerais'));
}
function vObs(){
 var pend=obsGerais(false),conc=obsGerais(true);
 var h='<div class="card"><div class="tit">📝 Observações gerais (empresa)</div>'+
  '<p class="sub">Acertos com lojas e pendências que não são de um carro. As pendências de cada carro ficam na ficha do carro.</p>'+
  '<button class="btn" onclick="obsNova(\'\')">➕ Nova observação geral</button>'+
  '<div class="sect">Pendentes ('+pend.length+')</div>'+obsListaHtml(pend,false)+
  (conc.length?'<details style="margin:8px 0"><summary class="sub">✅ Concluídas ('+conc.length+')</summary>'+obsListaHtml(conc,false)+'</details>':'')+
 '</div>';
 /* pendências por carro (visão geral que substitui o Notas) */
 var carros={};
 Object.keys(S.observacoes||{}).forEach(function(k){var o=S.observacoes[k];if(o.carro&&!o.feito)carros[o.carro]=(carros[o.carro]||0)+1});
 var pks=Object.keys(carros);
 h+='<div class="card"><div class="tit">🚗 Pendências por carro</div>';
 if(!pks.length)h+='<div class="sub">Nenhum carro com pendência aberta.</div>';
 else pks.sort().forEach(function(pk){
  var c=S.carros[pk];if(!c)return;
  h+='<div class="card tap" style="margin:0 0 6px" onclick="ficha(\''+pk+'\')"><div class="row"><div class="grow">'+
   '<div class="tit" style="font-size:14px">'+esc(tituloCarro(c))+' — '+esc(fmtPlaca(c.placa))+'</div>'+
   '<div class="sub">'+esc(primNome(c.motorista||''))+'</div></div>'+
   '<div style="color:var(--warn);font-weight:800">'+carros[pk]+' pendente'+(carros[pk]>1?'s':'')+'</div></div></div>';
 });
 h+='</div>';
 return h;
}

function vManut(){
 var rasc=null;try{rasc=JSON.parse(localStorage.getItem(RASC_K)||'null')}catch(e){}
 if(rasc&&(rasc.MP||[]).concat(rasc.MB||[]).some(function(x){return (x.valor||x.desc||x.servicos||'').toString().trim()})){
  MP=rasc.MP||[];MB=rasc.MB||[];
  setTimeout(function(){
   var s=function(id,v){var e=document.getElementById(id);if(e&&v)e.value=v};
   s('mCarro',rasc.carro);if(rasc.carro)mPuxaCarro();
   s('mMotorista',rasc.mot);s('mIni',rasc.ini);s('mFim',rasc.fim);s('mOdo',rasc.odo);
   toast('📝 Rascunho recuperado — nada se perdeu');
  },60);
 }
 if(!MP.length)MP=[{valor:'',desc:'',loja:''}];
 if(!MB.length)MB=[{titulo:'Mecânico',nome:'Vinícius',valor:'',servicos:''}];
 var h='<div class="card"><div class="tit">🔧 Nova manutenção</div>'+
 '<label>Carro</label><select id="mCarro" onchange="mPuxaCarro();mRasc()"><option value="">— selecione —</option>'+opcoesCarros()+'</select>'+
 '<div id="mCarroInfo" class="sub"></div>'+
 '<label>Motorista</label><input id="mMotorista" oninput="mRasc()" placeholder="sugere o atual ao escolher o carro">'+
 '<div class="grid2"><div><label>Data (início)</label><input type="date" id="mIni" onchange="mRasc()" value="'+hoje()+'"></div>'+
 '<div><label>Data fim (se for período)</label><input type="date" id="mFim" onchange="mRasc()"></div></div>'+
 '<label>Odômetro (km)</label><input id="mOdo" oninput="mRasc()" inputmode="numeric" placeholder="101117">'+
 '<div class="sect">Peças</div><div id="mPecas"></div>'+
 '<button class="btn mini sec" onclick="MP.push({valor:\'\',desc:\'\',loja:\'\'});mDesenha()">➕ Peça</button>'+
 '<div class="sect">Mão de obra</div><div id="mBlocos"></div>'+
 '<button class="btn mini sec" onclick="MB.push({titulo:\'\',nome:\'\',valor:\'\',servicos:\'\'});mDesenha()">➕ Bloco (Borracheiro, Retífica…)</button>'+
 '<div class="card" style="margin-top:12px;background:var(--card2)"><div class="kv">'+
 '<b>Peças</b><span id="mTotP">R$ 0,00</span><b>Mão de obra</b><span id="mTotM">R$ 0,00</span>'+
 '<b>TOTAL GERAL</b><span id="mTotG" style="color:var(--warn);font-weight:800">R$ 0,00</span></div></div>'+
 '<button class="btn ok" onclick="gerarManut()">✅ GERAR TEXTO + SALVAR NO HISTÓRICO</button>'+
 '<div id="mSaida"></div></div>';
 setTimeout(mDesenha,30);
 return h;
}
function opcoesCarros(sel){
 return carrosOrdenados().map(function(c){var pk=normPlaca(c.placa);
  return '<option value="'+pk+'"'+(pk===sel?' selected':'')+'>'+esc(tituloCarro(c))+' — '+esc(fmtPlaca(c.placa))+'</option>'}).join('');
}
function mPuxaCarro(){
 var pk=document.getElementById('mCarro').value,c=S.carros[pk];
 if(!c){document.getElementById('mCarroInfo').textContent='';return}
 document.getElementById('mCarroInfo').innerHTML='🚗 '+esc(tituloCarro(c))+' · '+esc(fmtPlaca(c.placa));
 if(c.motorista)document.getElementById('mMotorista').value=primNome(c.motorista);
 var kk=c.kmUltima||c.kmAtual;if(kk)document.getElementById('mOdo').placeholder=String(kk);
}
function mDesenha(){
 var hp='';
 MP.forEach(function(p,i){
  hp+='<div class="grid3">'+
   '<input placeholder="R$" inputmode="decimal" value="'+esc(p.valor)+'" oninput="MP['+i+'].valor=this.value;mTotais()">'+
   '<input placeholder="descrição da peça" value="'+esc(p.desc)+'" oninput="MP['+i+'].desc=this.value">'+
   '<input placeholder="loja" value="'+esc(p.loja)+'" oninput="MP['+i+'].loja=this.value">'+
   '<button class="xbt" onclick="MP.splice('+i+',1);mDesenha()">✕</button></div>';
 });
 document.getElementById('mPecas').innerHTML=hp||'<div class="sub">Sem peças.</div>';
 var hb='';
 MB.forEach(function(b,i){
  hb+='<div class="card" style="margin:6px 0;background:var(--card2)"><div class="grid2">'+
   '<div><label>Título</label><input placeholder="Mecânico / Borracheiro / Retífica" value="'+esc(b.titulo)+'" oninput="MB['+i+'].titulo=this.value"></div>'+
   '<div><label>Profissional</label><input placeholder="Vinícius" value="'+esc(b.nome)+'" oninput="MB['+i+'].nome=this.value"></div></div>'+
   '<label>Valor da mão de obra (R$)</label><input placeholder="1.700,00" inputmode="decimal" value="'+esc(b.valor)+'" oninput="MB['+i+'].valor=this.value;mTotais()">'+
   '<label>Serviços (um por linha; anote "Próxima troca com X km" e "GARANTIA ATÉ data" quando houver)</label>'+
   '<textarea oninput="MB['+i+'].servicos=this.value">'+esc(b.servicos)+'</textarea>'+
   '<button class="btn mini red" onclick="MB.splice('+i+',1);mDesenha()">Remover bloco</button></div>';
 });
 document.getElementById('mBlocos').innerHTML=hb;
 mTotais();
}
function valorDoBloco(nome){var m=String(nome||'').match(/R\$\s*([\d\.\,]+)/);return m?parseBRL(m[1]):0}
function mTotais(){
 mRasc();
 var tp=0;MP.forEach(function(p){tp+=parseBRL(p.valor)});
 var tm=0;MB.forEach(function(b){tm+=parseBRL(b.valor)||valorDoBloco(b.nome)});
 var el;
 if(el=document.getElementById('mTotP'))el.textContent='R$ '+fmtBRL(tp);
 if(el=document.getElementById('mTotM'))el.textContent='R$ '+fmtBRL(tm);
 if(el=document.getElementById('mTotG'))el.textContent='R$ '+fmtBRL(tp+tm);
}
function buildManutTexto(m,carro){
 var t='*VEÍCULO:* '+carro.nome+(carro.motor?' '+carro.motor:'')+'\n'+
 '*PLACA:* '+fmtPlaca(carro.placa)+'\n'+
 '*MOTORISTA:* '+m.motorista+'\n'+
 '*DATA:* '+periodoTexto(m.dataIni,m.dataFim)+'\n'+
 '*ODÔMETRO:* '+fmtKm(m.odometro)+' km\n'+
 '_______________________________________\n';
 if(m.pecas.length){
  t+='\n*[ PEÇAS: R$ '+fmtBRL(m.totalPecas)+' ]*\n';
  m.pecas.forEach(function(p){
   t+='• R$ '+fmtBRL(p.valor)+' - '+p.desc+(p.loja?' ('+p.loja+')':'')+'\n';
  });
 }
 if(m.blocos.length){
  t+='\n*[ MÃO DE OBRA: R$ '+fmtBRL(m.totalMO)+' ]*\n';
  m.blocos.forEach(function(b){
   t+='*'+(b.titulo||'Mecânico')+':* '+(b.nome||'')+(b.valor?' — R$ '+fmtBRL(b.valor):'')+'\n';
   b.servicos.forEach(function(s){t+='• '+s+'\n'});
  });
 }
 t+='\n*TOTAL GERAL: R$ '+fmtBRL(m.total)+'*';
 return t;
}
function gerarManut(){
 var pk=document.getElementById('mCarro').value;
 if(!pk){toast('Escolha o carro');return}
 var carro=S.carros[pk];
 var mot=document.getElementById('mMotorista').value.trim();
 if(!mot){toast('Informe o motorista');return}
 var ini=document.getElementById('mIni').value,fim=document.getElementById('mFim').value;
 if(!ini){toast('Informe a data');return}
 var odo=parseInt(document.getElementById('mOdo').value.replace(/\D/g,''),10)||0;
 var pecas=MP.filter(function(p){return p.desc.trim()||parseBRL(p.valor)>0}).map(function(p){return{valor:parseBRL(p.valor),desc:p.desc.trim(),loja:p.loja.trim()}});
 var blocos=MB.filter(function(b){return b.nome.trim()||b.servicos.trim()||parseBRL(b.valor)>0}).map(function(b){
  return{titulo:(b.titulo||'Mecânico').trim(),nome:b.nome.trim(),valor:parseBRL(b.valor),servicos:b.servicos.split('\n').map(function(s){return s.trim()}).filter(Boolean)};
 });
 var tp=0;pecas.forEach(function(p){tp+=p.valor});
 var tm=0;blocos.forEach(function(b){tm+=b.valor});
 var m=normManut({id:idNovo('mn'),carro:pk,motorista:mot,dataIni:ini,dataFim:fim||'',odometro:odo,
  pecas:pecas,blocos:blocos,totalPecas:tp,totalMO:tm,total:tp+tm,criadoEm:Date.now()});
 m.texto=buildManutTexto(m,carro);
 S.manutencoes[m.id]=m;
 if(odo>(carro.kmUltima||0)){carro.kmUltima=odo;carro.kmUltimaData=fim||ini}
 /* próximas trocas automáticas */
 blocos.forEach(function(b){b.servicos.forEach(function(s){
  if(/pr[óo]xima\s+troca/i.test(s))carro.proximasTrocas.push({texto:s});
 })});
 save();
 mRascLimpa();
 document.getElementById('mSaida').innerHTML='<div class="sect">Texto gerado (padrão WhatsApp)</div>'+
  '<div class="mono" id="mTexto">'+esc(m.texto)+'</div>'+
  '<button class="btn" onclick="copiarManut(\''+m.id+'\')">📋 COPIAR</button>';
 toast('✅ Gravado no histórico do '+carro.nome);
 MP=[];MB=[];
}
function copiarTexto(t){
 if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('📋 Copiado!')},function(){copiarFallback(t)})}
 else copiarFallback(t);
}
function copiarFallback(t){
 var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
 document.body.appendChild(ta);ta.focus();ta.select();
 try{document.execCommand('copy');toast('📋 Copiado!')}catch(e){toast('Segure no texto e copie manualmente')}
 document.body.removeChild(ta);
}
function copiarManut(id){copiarTexto(S.manutencoes[id].texto)}
function verManut(id){
 var m=S.manutencoes[id];if(!m)return;
 var c=S.carros[m.carro]||{nome:m.carro,placa:m.carro,motor:''};
 openSheet('<h3>'+esc(c.nome)+' — '+esc(periodoTexto(m.dataIni,m.dataFim))+'</h3>'+
  '<div class="mono">'+esc(m.texto)+'</div>'+
  '<button class="btn" onclick="copiarManut(\''+id+'\')">📋 Copiar</button>'+
  '<button class="btn red" onclick="excluirManut(\''+id+'\')">🗑 Excluir manutenção</button>'+
  '<button class="btn sec" onclick="closeSheet(2)">Fechar</button>',2);
}
function excluirManut(id){
 var m=S.manutencoes[id];
 ask('Excluir manutenção?','R$ '+fmtBRL(m.total)+' de '+periodoTexto(m.dataIni,m.dataFim)+' sai do histórico e do total do carro.','Excluir',function(){
  delete S.manutencoes[id];save();closeSheet(2);render();toast('🗑 Excluída');
 });
}

/* ===================== HISTÓRICO GERAL ===================== */
function vHistorico(){
 var todas=Object.keys(S.manutencoes).map(function(k){return S.manutencoes[k]})
  .sort(function(a,b){return (b.dataIni||'').localeCompare(a.dataIni)||b.criadoEm-a.criadoEm});
 var q=BUSCA_H.toLowerCase();
 if(q)todas=todas.filter(function(m){
  var c=S.carros[m.carro]||{};
  return (m.motorista+' '+m.carro+' '+(c.nome||'')+' '+(c.placa||'')+' '+m.texto).toLowerCase().indexOf(q)>=0;
 });
 var h='<div class="search"><input placeholder="🔎 Buscar por placa, motorista, peça…" value="'+esc(BUSCA_H)+'" oninput="BUSCA_H=this.value;render()"></div>';
 /* total por carro */
 var tot={};Object.keys(S.manutencoes).forEach(function(k){var m=S.manutencoes[k];tot[m.carro]=(tot[m.carro]||0)+m.total});
 var chips=Object.keys(tot).sort(function(a,b){return tot[b]-tot[a]});
 if(chips.length&&!q){
  h+='<div class="card"><div class="tit" style="font-size:13px;margin-bottom:4px">💰 Total gasto por carro</div>';
  chips.forEach(function(pk){var c=S.carros[pk];h+='<span class="chip warn">'+esc(c?c.nome:pk)+' · R$ '+fmtBRL(tot[pk])+'</span>'});
  h+='</div>';
 }
 if(!todas.length)h+='<div class="card"><div class="sub">Nenhuma manutenção'+(q?' encontrada para essa busca':' registrada ainda')+'.</div></div>';
 todas.forEach(function(m){
  var c=S.carros[m.carro]||{nome:m.carro,placa:m.carro};
  h+='<div class="card tap" onclick="verManut(\''+m.id+'\')"><div class="row">'+plateHtml(c.placa)+
   '<div class="grow"><div class="tit" style="font-size:14px">'+esc(tituloCarro(c))+'</div>'+
   '<div class="sub">'+esc(periodoTexto(m.dataIni,m.dataFim))+' · '+esc(primNome(m.motorista))+'</div></div>'+
   '<div style="color:var(--warn);font-weight:800">R$ '+fmtBRL(m.total)+'</div></div></div>';
 });
 return h;
}
</script>

<script>
/* ===================== NOVO CONTRATO ===================== */
function vContrato(){
 var h='<div class="card"><div class="tit">📄 Novo contrato de locação</div><p class="sub">4 passos. O app preenche o que já sabe; você confere e gera. O Word sai no padrão GuimasCar (5 folhas).</p>'+
 '<div class="sect">① Carro e locador</div><label>Carro</label><select id="ncCarro" onchange="ncPuxaCarro();ncResumo()"><option value="">— selecione —</option>'+opcoesCarros()+'</select>'+
 '<div id="ncCarroInfo" class="sub"></div>'+
 '<label>Locador</label><select id="ncLocador">'+selLocadores('hudson')+'</select>'+
 '<div class="sect">② Locatário (motorista novo)</div>'+
 '<label>Nome completo</label><input id="ncNome" oninput="ncResumo()">'+
 '<label>CPF</label><input id="ncCpf" inputmode="numeric" placeholder="000.000.000-00">'+
 '<div class="grid2"><div><label>RG (número)</label><input id="ncRgNum" inputmode="numeric"></div>'+
 '<div><label>Órgão expedidor</label><input id="ncRgOrg" placeholder="DETRAN/RJ"></div></div>'+
 '<div class="grid2"><div><label>CNH</label><input id="ncCnh" inputmode="numeric"></div>'+
 '<div><label>Validade CNH</label><input type="date" id="ncCnhVal"></div></div>'+
 '<label>Endereço completo</label><input id="ncEnd" placeholder="Rua…, nº, bairro, cidade/UF">'+
 '<div class="grid2"><div><label>CEP</label><input id="ncCep" inputmode="numeric"></div>'+
 '<div><label>Telefone</label><input id="ncTel" inputmode="tel" placeholder="(21) 9…"></div></div>'+
 '<div class="sect">③ Valores, prazo e veículo</div>'+
 '<div class="grid2"><div><label>Semanal (R$)</label><input id="ncSemanal" oninput="ncResumo()" inputmode="decimal" oninput="ncCl34Auto()"></div>'+
 '<div><label>Caução (R$)</label><input id="ncCaucao" oninput="ncResumo()" inputmode="decimal" oninput="ncMultaAuto()"></div></div>'+
 '<div class="grid2"><div><label>Multa diária de atraso (R$)</label><input id="ncMultaDia" inputmode="decimal" value="115,00"></div>'+
 '<div><label>Multa de rescisão (R$)</label><input id="ncMultaResc" inputmode="decimal"></div></div>'+
 '<div class="grid2"><div><label>Início</label><input type="date" id="ncIni" value="'+hoje()+'" onchange="document.getElementById(\'ncFim\').value=mais3Meses(this.value)"></div>'+
 '<div><label>Fim (padrão 3 meses)</label><input type="date" id="ncFim" onchange="ncResumo()" value="'+mais3Meses(hoje())+'"></div></div>'+
 '<label>Quilometragem inicial</label><input id="ncKm" inputmode="numeric">'+
 '<label>Acessórios</label><input id="ncAcess" value="Estepe, triângulo, chave de roda, macaco">'+
 '<label>Combustíveis</label><input id="ncComb" placeholder="Etanol / GNV 16m³">'+
 '<div class="sect">④ PIX de recebimento</div>'+
 '<div class="grid2"><div><label>Banco</label><input id="ncPixBanco" value="Inter"></div>'+
 '<div><label>Favorecido</label><input id="ncPixFav" value="Fabio"></div></div>'+
 '<label>Chave PIX (CPF)</label><input id="ncPixChave" value="075.351.417-65">'+
 '<div class="sect">⑤ Cláusula 3.4 — semana antecipada</div>'+
 '<label>Este contrato tem semana antecipada?</label>'+
 '<select id="ncTem34" onchange="ncCl34Auto(true);ncResumo()"><option value="sim">Sim — incluir cláusula 3.4</option><option value="nao">Não — gerar contrato sem a cláusula 3.4</option></select>'+
 '<textarea id="ncCl34"></textarea>'+
 '<div class="sect">✅ Conferir e gerar</div><div id="ncResumo" class="sub" style="margin-bottom:8px">Preencha acima — o resumo aparece aqui.</div>'+'<button class="btn ok" onclick="gerarContrato()">📝 GERAR CONTRATO WORD + REGISTRAR</button>'+
 '<div class="sub" style="margin-top:8px">O contrato entra como vigente na ficha do carro. Se já houver um vigente, ele vai para os anteriores automaticamente.</div></div>';
 return h;
}
function ncPuxaCarro(){
 var pk=document.getElementById('ncCarro').value,c=S.carros[pk];
 var info=document.getElementById('ncCarroInfo');
 if(!c){info.textContent='';return}
 info.innerHTML='🚗 '+esc(tituloCarro(c))+' · '+esc(fmtPlaca(c.placa))+' · '+fmtKm(c.kmUltima||c.kmAtual)+' km · ref. '+(c.valorRef?'R$ '+fmtBRL(c.valorRef):'—');
 document.getElementById('ncLocador').value=c.locadorId;
 if(c.semanalPadrao)document.getElementById('ncSemanal').value=fmtBRL(c.semanalPadrao);
 if(c.caucaoPadrao){document.getElementById('ncCaucao').value=fmtBRL(c.caucaoPadrao);ncMultaAuto()}
 document.getElementById('ncKm').value=c.kmUltima||c.kmAtual||'';
 document.getElementById('ncComb').value=c.combustivel||'';
 ncCl34Auto();
}
function ncMultaAuto(){var v=document.getElementById('ncCaucao').value;document.getElementById('ncMultaResc').value=v}
function ncResumo(){
 try{
  var g=function(i){var e=document.getElementById(i);return e?e.value:''};
  var pk=g('ncCarro'),c=S.carros[pk];
  var el=document.getElementById('ncResumo');if(!el)return;
  if(!pk||!g('ncNome')){el.textContent='Preencha acima — o resumo aparece aqui.';return}
  el.innerHTML='🚗 <b>'+esc(c?tituloCarro(c):pk)+'</b> ('+esc(fmtPlaca(pk))+') → 👤 <b>'+esc(g('ncNome'))+'</b><br>'+
   '💰 R$ '+esc(g('ncSemanal')||'?')+'/sem · caução R$ '+esc(g('ncCaucao')||'?')+' · '+dataBR(g('ncIni'))+' → '+dataBR(g('ncFim'))+
   ' · 3.4: '+(g('ncTem34')==='sim'?'sim':'não');
 }catch(e){}

 files.forEach(function(f){

   .forEach(function(p){parts.push(p)});
  central.push({name:name,crc:crc,size:data.length,off:off});

 });
 var cdStart=off,cdLen=0;
 central.forEach(function(c){
  [u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(c.crc),u32(c.size),u32(c.size),u16(c.name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(c.off),c.name]
   .forEach(function(p){parts.push(p)});

function importar(){
 var inp=document.getElementById('impIn');
 if(!inp.files||!inp.files.length){toast('Selecione os arquivos');return}
 var files=Array.prototype.slice.call(inp.files),i=0,ok=0,falha=[];
 var stat=document.getElementById('impStat');
 function prox(){
  if(i>=files.length){
   save();render();
   stat.innerHTML+='<br><b>✅ Concluído: '+ok+' enviados'+(falha.length?' · ⚠️ ignorados: '+falha.join(', '):'')+'</b>';
   toast('☁️ Importação concluída');return;
  }
  var f=files[i++],m,path=null,marca=null;
  var nome=f.name.replace(/\.pdf$|\.docx$/i,'');
  if(m=nome.match(/^CRLV-([A-Z0-9]{7})$/i)){var pk=m[1].toUpperCase();if(S.carros[pk]){path=pk+'/crlv';marca=function(){S.carros[pk].temCrlv=true}}}
  else if(m=nome.match(/^CONTRATOPDF-([A-Z0-9]{7})$/i)){var pk2=m[1].toUpperCase(),c2=S.carros[pk2];if(c2&&c2.contratoVigenteId){path=pk2+'/ct/'+c2.contratoVigenteId+'/pdf';marca=function(){S.contratos[c2.contratoVigenteId].temPdf=true}}}
  else if(m=nome.match(/^CONTRATO-([A-Z0-9]{7})$/i)){var pk3=m[1].toUpperCase(),c3=S.carros[pk3];if(c3&&c3.contratoVigenteId){path=pk3+'/ct/'+c3.contratoVigenteId+'/docx';marca=function(){S.contratos[c3.contratoVigenteId].temDocx=true}}}
  if(!path){falha.push(f.name);stat.innerHTML+='⚠️ '+esc(f.name)+' não reconhecido<br>';prox();return}
  var r=new FileReader();
  r.onload=function(){
   var b64=String(r.result).split(',')[1];
   DOCSREF.child(path).set({b64:b64,name:f.name,mime:f.type||'application/pdf',size:f.size,em:Date.now()}).then(function(){
    ok++;if(marca)marca();stat.innerHTML='☁️ '+ok+'/'+files.length+' — '+esc(f.name)+'<br>'+stat.innerHTML;prox();
   }).catch(function(e){falha.push(f.name);stat.innerHTML+='⚠️ '+esc(f.name)+': '+esc(e.message)+'<br>';prox()});
  };
  r.readAsDataURL(f);
 }
 stat.innerHTML='Enviando '+files.length+' arquivos…<br>';
 prox();
}

 }).catch(function(e){st.textContent='⚠️ '+e.message});
}
